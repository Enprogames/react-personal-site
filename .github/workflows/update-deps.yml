name: "Update Dependencies"

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays @ 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (cache pnpm)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Audit release-age exceptions
        run: |
          if grep -q '^minimumReleaseAgeExclude: \[\]' pnpm-workspace.yaml; then
            echo "No minimumReleaseAgeExclude entries configured." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### minimumReleaseAgeExclude entries"
              sed -n '/^minimumReleaseAgeExclude:/,$p' pnpm-workspace.yaml
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::minimumReleaseAgeExclude is not empty; review and remove exceptions when they are no longer needed."
          fi

      - name: Report latest available updates
        continue-on-error: true
        run: pnpm dlx npm-check-updates --target latest

      - name: Update versions with npm-check-updates
        run: pnpm dlx npm-check-updates -u --target semver

      - name: Install updated deps
        run: pnpm install

      - name: Run pnpm audit (non-blocking)
        continue-on-error: true
        run: pnpm audit

      - name: Verify clean install from lockfile
        run: pnpm install --frozen-lockfile

      - name: Check for package.json changes
        id: package_json
        run: |
          if git diff --name-only -- package.json | grep -q '^package.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify
        run: pnpm run verify

      - name: Create PR
        id: create_pr
        if: ${{ steps.package_json.outputs.changed == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.UPDATE_DEPS_TOKEN || github.token }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): update dependencies"
          branch: chore/update-deps
          body: |
            Automated dependency updates using npm-check-updates and pnpm.
            - Ran `pnpm dlx npm-check-updates -u --target semver`
            - Ran `pnpm install`
            - Ran `pnpm audit` (non-blocking report)
            - Ran `pnpm install --frozen-lockfile`
            - Ran `pnpm run verify`

      - name: Skip PR creation (package.json unchanged)
        if: ${{ steps.package_json.outputs.changed != 'true' }}
        run: |
          echo "::notice::package.json unchanged; skipping PR creation to avoid lockfile-only PRs."

      - name: Warn if PR creation is blocked
        if: ${{ steps.create_pr.outcome == 'failure' }}
        run: |
          echo "::warning::PR creation failed. Enable 'Allow GitHub Actions to create and approve pull requests' or set UPDATE_DEPS_TOKEN."
