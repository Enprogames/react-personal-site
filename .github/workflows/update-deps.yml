name: "Update Dependencies"

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays @ 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (cache npm)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Report latest available updates
        continue-on-error: true
        run: npx npm-check-updates --target latest

      - name: Update versions with npm-check-updates
        run: npx npm-check-updates -u --target semver

      - name: Install updated deps
        run: npm install

      - name: Run audit fix (best-effort)
        run: npm audit fix || true

      - name: Verify clean install from lockfile
        run: npm ci --no-audit --no-fund

      - name: Check for package.json changes
        id: package_json
        run: |
          if git diff --name-only -- package.json | grep -q '^package.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Create PR
        id: create_pr
        if: ${{ steps.package_json.outputs.changed == 'true' }}
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.UPDATE_DEPS_TOKEN || github.token }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): update dependencies"
          branch: chore/update-deps
          body: |
            Automated dependency updates using npm-check-updates and npm audit fix.
            - Ran `npx npm-check-updates -u --target semver`
            - Ran `npm install`
            - Ran `npm audit fix` (best-effort)
            - Ran `npm ci --no-audit --no-fund`
            - Ran `npm run lint`
            - Ran `npm test`
            - Ran `npm run build`

      - name: Skip PR creation (package.json unchanged)
        if: ${{ steps.package_json.outputs.changed != 'true' }}
        run: |
          echo "::notice::package.json unchanged; skipping PR creation to avoid lockfile-only PRs."

      - name: Warn if PR creation is blocked
        if: ${{ steps.create_pr.outcome == 'failure' }}
        run: |
          echo "::warning::PR creation failed. Enable 'Allow GitHub Actions to create and approve pull requests' or set UPDATE_DEPS_TOKEN."
